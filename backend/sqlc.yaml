version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "migrations"
    gen:
      go:
        package: "dbgen"
        out: "internal/db/gen"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_empty_slices: true
        emit_prepared_queries: false
        emit_exact_table_names: false
        emit_json_tags: true
        json_tags_case_style: "snake"
        overrides:
          - db_type: "citext"
            go_type: "string"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "inet"
            go_type: "string"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
