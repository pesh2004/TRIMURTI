version: "2"
run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - bodyclose
  settings:
    gosec:
      excludes:
        - G404 # math/rand is fine for non-crypto uses (seeded elsewhere)
        - G115 # int->uint conversion. Our call sites feed Argon2 params
               # read from env (bounded by config) and len(hash) which is
               # always tiny. The check is noisy without catching real bugs.
    staticcheck:
      checks: ['all', '-ST1000', '-ST1020', '-ST1021', '-ST1022']
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck, gosec]

issues:
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
