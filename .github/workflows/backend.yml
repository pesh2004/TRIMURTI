name: backend

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: trimurti
          POSTGRES_PASSWORD: trimurti_dev_only
          POSTGRES_DB: trimurti
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U trimurti"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgres://trimurti:trimurti_dev_only@localhost:5432/trimurti?sslmode=disable
      REDIS_ADDR: localhost:6379
      SESSION_SECRET: ci_session_secret_not_for_prod_usage_32byteshex_aaaaaa
      # PII key is validated by config.Load() in every env — the test job
      # runs migrate + seed + integration tests which all go through Load().
      # Value is test-only; not in any example file; not considered a
      # placeholder by the validator.
      PII_ENCRYPTION_KEY: ci_pii_key_not_for_prod_usage_64hexchars_aaaaaaaaaaaaaaaaaaaaaaaa
      APP_ENV: development
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      # Apply migrations so integration tests can talk to a real schema.
      # Tests that don't need the DB ignore this; tests that do gate on
      # DATABASE_URL being set and skip otherwise.
      - name: Apply migrations
        run: go run ./cmd/migrate up
      - name: go test
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7

  lint:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum
      # v7+ defaults to golangci-lint v2.x (v6 pins v1.64.x which was built
      # with Go 1.24 and refuses a go.mod that targets Go 1.25+).
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m

  vuln:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec
        uses: securego/gosec@master
        with:
          args: -exclude-dir=internal/db/gen ./backend/...
