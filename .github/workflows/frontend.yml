name: frontend

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/frontend.yml'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test -- --run
      - name: Build
        run: npm run build
      - name: Audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: false

  e2e:
    # Phase-0 smoke: log in with seeded admin, confirm app shell renders.
    # Runs real Postgres + Redis + backend API + Vite, no mocks.
    needs: ci
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: trimurti
          POSTGRES_PASSWORD: trimurti_dev_only
          POSTGRES_DB: trimurti
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U trimurti"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://trimurti:trimurti_dev_only@localhost:5432/trimurti?sslmode=disable
      REDIS_ADDR: localhost:6379
      SESSION_SECRET: ci_session_secret_not_for_prod_usage_32byteshex_aaaaaa
      APP_ENV: development
      SEED_ADMIN_EMAIL: admin@trimurti.local
      SEED_ADMIN_PASSWORD: ci_admin_password_only_for_e2e
      E2E_ADMIN_EMAIL: admin@trimurti.local
      E2E_ADMIN_PASSWORD: ci_admin_password_only_for_e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Apply migrations
        working-directory: backend
        run: go run ./cmd/migrate up
      - name: Seed admin + RBAC
        working-directory: backend
        run: go run ./cmd/seed

      - name: Start backend API
        working-directory: backend
        run: |
          go build -o /tmp/trimurti-api ./cmd/api
          /tmp/trimurti-api &
          echo $! > /tmp/api.pid
      - name: Wait for /healthz
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8080/healthz >/dev/null; then
              echo "API up"; exit 0
            fi
            sleep 1
          done
          echo "API did not come up"; exit 1

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: frontend
        run: npm run e2e

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/api.pid) 2>/dev/null || true
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
