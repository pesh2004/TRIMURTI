version: 2
updates:
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'deps(go)'

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'deps(npm)'
    groups:
      react:
        patterns: ['react', 'react-dom', '@types/react', '@types/react-dom']
      tanstack:
        patterns: ['@tanstack/*']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'deps(actions)'

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    commit-message:
      prefix: 'deps(docker,backend)'

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    commit-message:
      prefix: 'deps(docker,frontend)'
