# Production stack: single droplet, no exposed DB/Redis ports.
# Caddy is the only public-facing service (ports 80 + 443).
# All service-to-service talk happens on the internal bridge network.

name: trimurti-prod

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

services:
  postgres:
    image: postgres:17-alpine
    container_name: trimurti-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--locale=C.UTF-8 --encoding=UTF-8"
      TZ: Asia/Bangkok
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1536M
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    container_name: trimurti-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "384mb", "--maxmemory-policy", "allkeys-lru", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trimurti-backend
    restart: always
    environment:
      APP_ENV: production
      APP_PORT: 8080
      APP_BASE_URL: ${APP_BASE_URL}
      FRONTEND_BASE_URL: ${APP_BASE_URL}
      LOG_LEVEL: info
      TZ: Asia/Bangkok
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_TTL_MINUTES: 30
      SESSION_COOKIE_NAME: trimurti_sess
      SESSION_COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      SESSION_COOKIE_SECURE: "true"
      CORS_ALLOWED_ORIGINS: ${APP_BASE_URL}
      RATE_LIMIT_PER_MINUTE: 100
      LOGIN_RATE_LIMIT_PER_15MIN: 5
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  migrate:
    # One-shot container: runs migrations then exits. `deploy.sh` invokes it
    # on every deploy via `docker compose run --rm migrate`.
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trimurti-migrate
    entrypoint: ["/app/migrate", "up"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal]
    profiles: [tools]

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trimurti-seed
    entrypoint: ["/app/seed"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      SESSION_SECRET: ${SESSION_SECRET}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@trimurti.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal]
    profiles: [tools]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trimurti-frontend
    restart: always
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  caddy:
    image: caddy:2-alpine
    container_name: trimurti-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks: [internal, public]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
